<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - FGO Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen relative pb-10">
    <!-- Header -->
    <header class="bg-[#1e293b] border-b-4 border-yellow-500 shadow-xl top-0 z-50 sticky">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-white font-bold text-xl shadow-[0_0_15px_rgba(59,130,246,0.6)] border border-blue-300">F</div>
                <h1 class="text-xl md:text-2xl font-bold text-white tracking-wider">Chaldea Settings</h1>
            </div>
            <a href="/" class="text-blue-400 hover:text-blue-300 flex items-center gap-1 font-bold text-sm tracking-wide">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                BACK TO HUB
            </a>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 py-10">
        <div class="bg-white rounded-xl shadow-2xl p-8 border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2 border-b pb-4">
                <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                AI Translation Settings
            </h2>
            
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">API Type</label>
                        <select id="apiType" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow shadow-sm">
                            <option value="openai">OpenAI</option>
                            <option value="custom">Custom</option>
                            <option value="gemini">Gemini</option>
                        </select>
                        <p class="text-xs text-gray-500 mt-1">Select the provider format your endpoint expects.</p>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">Base Model</label>
                        <input type="text" id="baseModel" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow shadow-sm" placeholder="e.g. gpt-4, gemini-pro">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">API Base URL</label>
                        <input type="text" id="apiBase" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow shadow-sm" placeholder="https://api.openai.com/v1">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">API Key</label>
                        <input type="password" id="apiKey" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow shadow-sm font-mono" placeholder="sk-.......................................">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">Authentication Method</label>
                        <select id="authType" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow shadow-sm">
                            <option value="bearer">Bearer (Header)</option>
                            <option value="api_key">API Key (Header/Param)</option>
                        </select>
                    </div>
                </div>

                <div class="pt-6 mt-6 border-t border-gray-200 flex justify-end">
                    <button onclick="saveSettings()" id="saveBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                        Save Configuration
                    </button>
                    <span id="saveStatus" class="ml-4 flex items-center text-sm font-bold text-green-600 opacity-0 transition-opacity">Saved successfully!</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiTypeDefaults = {
            openai: { api_base: 'https://api.openai.com/v1', base_model: 'gpt-4-turbo-preview', auth_type: 'bearer' },
            custom: { api_base: '', base_model: '', auth_type: 'bearer' },
            gemini: { api_base: 'https://generativelanguage.googleapis.com/v1beta', base_model: 'gemini-2.5-flash', auth_type: 'api_key' }
        };

        function applyApiTypeDefaults() {
            const type = document.getElementById('apiType').value;
            const defs = apiTypeDefaults[type] || apiTypeDefaults.openai;
            document.getElementById('apiBase').placeholder = defs.api_base;
            document.getElementById('baseModel').placeholder = defs.base_model;
            document.getElementById('authType').value = defs.auth_type;
        }

        async function loadSettings() {
            try {
                const res = await fetch('/get_preferences');
                const prefs = await res.json();
                if(prefs.apiType) document.getElementById('apiType').value = prefs.apiType;
                if(prefs.baseModel) document.getElementById('baseModel').value = prefs.baseModel;
                if(prefs.apiBase) document.getElementById('apiBase').value = prefs.apiBase;
                if(prefs.apiKey) document.getElementById('apiKey').value = prefs.apiKey;
                if(prefs.authType) document.getElementById('authType').value = prefs.authType;
                applyApiTypeDefaults();
            } catch(e) { console.error('Failed to load settings', e); }
        }

        async function saveSettings() {
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Saving...';
            btn.disabled = true;

            const data = {
                api_type: document.getElementById('apiType').value,
                base_model: document.getElementById('baseModel').value,
                api_base: document.getElementById('apiBase').value,
                api_key: document.getElementById('apiKey').value,
                auth_type: document.getElementById('authType').value
            };

            try {
                const res = await fetch('/save_preferences', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if(res.ok) {
                    const status = document.getElementById('saveStatus');
                    status.style.opacity = '1';
                    setTimeout(() => status.style.opacity = '0', 3000);
                } else {
                    alert('Error saving settings.');
                }
            } catch(e) {
                alert('Error: ' + e);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            document.getElementById('apiType').addEventListener('change', applyApiTypeDefaults);
        });
    </script>
</body>
</html>
