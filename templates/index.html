<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FGO Dialogue Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .loading { display: none; }
        .loading.active { display: flex; }
        
        /* Custom scrollbar for better look in data areas */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        html, body { overflow-x: hidden; }
        button, input, select { min-height: 44px; }
        .result-item { border-radius: 0.5rem; }

        @media (max-width: 640px) {
            .mobile-edge {
                margin-left: -0.75rem;
                margin-right: -0.75rem;
                border-left-width: 0;
                border-right-width: 0;
                border-radius: 0;
            }
            .mobile-safe-x {
                padding-left: max(0.75rem, env(safe-area-inset-left));
                padding-right: max(0.75rem, env(safe-area-inset-right));
            }
            .discovery-collapsed #discoveryTabs,
            .discovery-collapsed #discoveryBody {
                display: none;
            }
            .discovery-collapsed #discoveryArrow {
                transform: rotate(-90deg);
            }
            .dialogue-table,
            .dialogue-table tbody,
            .dialogue-table tr,
            .dialogue-table td {
                display: block;
                width: 100%;
            }
            .dialogue-table thead {
                display: none;
            }
            .dialogue-table tr {
                margin-bottom: 0.75rem;
            }
            .dialogue-table td {
                border-radius: 0.5rem;
                line-height: 1.55;
                overflow-wrap: anywhere;
            }
            .dialogue-table td + td {
                margin-top: 0.35rem;
            }
            .dialogue-table td::before {
                content: attr(data-label);
                display: block;
                margin-bottom: 0.25rem;
                color: #64748b;
                font-size: 0.68rem;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }
            .result-item .truncate {
                overflow: visible;
                text-overflow: clip;
                white-space: normal;
            }
        }
        .phase-active .phase-title,
        .phase-active .phase-meta {
            color: #fff;
        }
        .phase-active .phase-tag {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.35);
            color: #fff;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-800">

    <!-- Top Navigation -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div class="max-w-[1600px] mx-auto mobile-safe-x px-3 sm:px-6 lg:px-8 h-14 sm:h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 min-w-0">
                <svg class="w-7 h-7 sm:w-8 sm:h-8 text-indigo-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
                <h1 class="text-lg sm:text-xl font-bold text-slate-900 tracking-tight truncate">FGO Translator</h1>
            </div>
            <div class="flex items-center gap-1">
                <a href="https://github.com/securityCFS/fgo_translator" target="_blank" rel="noopener noreferrer" class="p-2 text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded-full transition-colors" title="View on GitHub">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.337-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path></svg>
                </a>
                <button id="settingsBtn" type="button" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors" onclick="toggleSettings()"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="flex-1 max-w-[1600px] w-full mx-auto mobile-safe-x p-3 sm:p-6 lg:p-8 flex flex-col lg:flex-row gap-4 sm:gap-6 items-start">
        
        <!-- Left Sidebar: Discovery Tools -->
        <aside id="discoveryCard" class="w-full lg:w-[360px] flex-shrink-0 bg-white rounded-lg sm:rounded-xl shadow-sm border border-slate-200 overflow-hidden lg:sticky lg:top-24">
            <button id="discoveryToggle" type="button" class="sm:hidden w-full px-4 py-3 flex items-center justify-between gap-3 bg-white text-left" onclick="toggleDiscoveryPanel()" aria-expanded="true" aria-controls="discoveryBody">
                <span class="min-w-0">
                    <span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Discovery</span>
                    <span id="discoverySummary" class="block text-sm font-semibold text-slate-900 truncate">Search</span>
                </span>
                <svg id="discoveryArrow" class="w-5 h-5 flex-shrink-0 text-slate-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div id="discoveryTabs" class="border-b border-slate-200 bg-slate-50/50">
                <nav class="flex" aria-label="Tabs">
                    <button onclick="switchDiscoveryTab('searchPanel', this)" class="discovery-tab flex-1 py-3 px-2 sm:px-4 text-xs sm:text-sm font-medium text-indigo-600 border-b-2 border-indigo-600 bg-white whitespace-nowrap">Search</button>
                    <button onclick="switchDiscoveryTab('latestActPanel', this)" class="discovery-tab flex-1 py-3 px-2 sm:px-4 text-xs sm:text-sm font-medium text-slate-500 border-b-2 border-transparent hover:text-slate-700 hover:border-slate-300 whitespace-nowrap">Latest Act</button>
                    <button onclick="switchDiscoveryTab('latestTaskPanel', this)" class="discovery-tab flex-1 py-3 px-2 sm:px-4 text-xs sm:text-sm font-medium text-slate-500 border-b-2 border-transparent hover:text-slate-700 hover:border-slate-300 whitespace-nowrap">Tasks</button>
                </nav>
            </div>

            <div id="discoveryBody" class="p-4 sm:p-5">
                <!-- Panel 1: Search -->
                <div id="searchPanel" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Server</label>
                        <select id="activityRegion" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                            <option value="JP">Japan (JP)</option>
                            <option value="NA">North America (NA)</option>
                            <option value="CN">China (CN)</option>
                            <option value="TW">Taiwan (TW)</option>
                            <option value="KR">Korea (KR)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Type</label>
                        <select id="activitySearchType" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                            <option value="war" selected>War</option>
                            <option value="event">Event</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Name or ID</label>
                        <input type="text" id="warName" placeholder="e.g. 9406600" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <button onclick="searchActivity()" class="w-full mt-2 bg-indigo-600 text-white font-medium py-2.5 px-4 rounded-lg hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-500/20 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        Search
                    </button>
                </div>

                <!-- Panel 2: Latest Activities -->
                <div id="latestActPanel" class="space-y-4 hidden">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Server</label>
                        <select id="latestActivityRegion" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                            <option value="JP">Japan (JP)</option><option value="NA">North America (NA)</option><option value="CN">China (CN)</option><option value="TW">Taiwan (TW)</option><option value="KR">Korea (KR)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Type</label>
                        <select id="latestActivityType" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                            <option value="war" selected>War</option><option value="event">Event</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Limit</label>
                        <input type="number" id="latestActivityLimit" min="1" max="200" value="50" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <button onclick="loadLatestActivities()" class="w-full mt-2 bg-slate-800 text-white font-medium py-2.5 px-4 rounded-lg hover:bg-slate-900 focus:ring-4 focus:ring-slate-500/20 active:scale-[0.98] transition-all">
                        Load Activities
                    </button>
                    <div id="latestActivityInfo" class="text-xs text-slate-500 mt-2 text-center"></div>
                </div>

                <!-- Panel 3: Latest Tasks -->
                <div id="latestTaskPanel" class="space-y-4 hidden">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Server</label>
                        <select id="latestTaskRegion" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                            <option value="JP">Japan (JP)</option><option value="NA">North America (NA)</option><option value="CN">China (CN)</option><option value="TW">Taiwan (TW)</option><option value="KR">Korea (KR)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Limit</label>
                        <input type="number" id="latestTaskLimit" min="1" max="200" value="50" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <button onclick="loadLatestTasks()" class="w-full mt-2 bg-slate-800 text-white font-medium py-2.5 px-4 rounded-lg hover:bg-slate-900 focus:ring-4 focus:ring-slate-500/20 active:scale-[0.98] transition-all">
                        Load Tasks
                    </button>
                    <div id="latestTaskInfo" class="text-xs text-slate-500 mt-2 text-center"></div>
                </div>
            </div>
        </aside>

        <!-- Right Workspace: Results & Translation -->
        <div class="flex-1 w-full flex flex-col space-y-4 sm:space-y-6 min-w-0">
            
            <!-- Activity Results -->
            <div class="mobile-edge bg-white rounded-lg sm:rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-4 py-3 sm:px-5 sm:py-4 flex items-center justify-between gap-3 border-b border-slate-100 bg-slate-50/50 cursor-pointer" onclick="toggleContainer('warResultList', 'warListArrow')">
                    <div class="min-w-0">
                        <h2 class="text-base font-semibold text-slate-800">Activity Selection</h2>
                        <div id="warResultInfo" class="text-sm text-slate-500 mt-0.5 break-words">Awaiting search...</div>
                    </div>
                    <svg id="warListArrow" class="w-5 h-5 flex-shrink-0 text-slate-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>
                <div id="warResultList" class="max-h-none sm:max-h-[600px] overflow-y-visible sm:overflow-y-auto p-2 bg-slate-50/30 space-y-1">
                    <!-- Dynamic Activity Results injected here -->
                </div>
            </div>

            <!-- Quest Results -->
            <div class="mobile-edge bg-white rounded-lg sm:rounded-xl shadow-sm border border-slate-200 overflow-hidden" id="questSection" style="display:none;">
                <div class="px-4 py-3 sm:px-5 sm:py-4 flex items-center justify-between gap-3 border-b border-slate-100 bg-slate-50/50 cursor-pointer" onclick="toggleContainer('questResultList', 'questListArrow')">
                    <div class="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4 min-w-0">
                        <div class="min-w-0">
                            <h2 id="questSectionTitle" class="text-base font-semibold text-slate-800">Related Quests</h2>
                            <div id="questResultInfo" class="text-sm text-slate-500 mt-0.5 break-words"></div>
                        </div>
                        <button id="getQuestBtn" onclick="event.stopPropagation(); getRelatedQuests()" class="self-start text-xs bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-200 px-3 py-1.5 rounded-md font-medium transition-colors">
                            Fetch Quests
                        </button>
                    </div>
                    <svg id="questListArrow" class="w-5 h-5 flex-shrink-0 text-slate-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>
                <div id="questActivityBanner" class="hidden"></div>
                <div id="questResultList" class="max-h-none sm:max-h-[520px] overflow-y-visible sm:overflow-y-auto p-2 sm:p-3 bg-slate-50/30 space-y-3">
                    <!-- Dynamic Quest Results injected here -->
                </div>
            </div>

            <!-- Translation Config & Process -->
            <div class="mobile-edge bg-white rounded-lg sm:rounded-xl shadow-sm border border-slate-200 overflow-hidden" id="translateSection" style="display:none;">
                
                <!-- Phase Picker — shown after a quest is selected, before translation options -->
                <div id="phasePicker" class="hidden p-4 sm:p-5 border-b border-slate-100 bg-slate-50/50">
                    <!-- Dynamically populated by selectQuest() -->
                </div>

                <!-- Options -->
                <div id="translationOptions" class="p-4 sm:p-5 border-b border-slate-100 bg-slate-50/50" style="display:none;">
                    <h2 class="text-base font-semibold text-slate-800 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
                        Translation Settings
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 items-end">
                        <div id="engineRow">
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Engine</label>
                            <select id="translationMethod" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
                                <option value="gpt">GPT API</option>
                                <option value="free">Free Engine</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Target Language</label>
                            <select id="targetLanguage" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none" onchange="onTargetLanguageChange()">
                                <optgroup label="AI Translation">
                                    <option value="Chinese (Simplified)" selected>Chinese (Simplified)</option>
                                    <option value="Chinese (Traditional)">Chinese (Traditional)</option>
                                    <option value="English">English</option>
                                    <option value="Korean">Korean</option>
                                    <option value="French">French</option>
                                    <option value="Spanish">Spanish</option>
                                    <option value="Vietnamese">Vietnamese</option>
                                    <option value="Thai">Thai</option>
                                    <option value="Indonesian">Indonesian</option>
                                </optgroup>
                                <!-- Atlas optgroup injected dynamically by checkAtlasAvailability() -->
                            </select>
                        </div>
                        <button onclick="translateSelectedQuest()" class="w-full bg-emerald-600 text-white font-medium py-2 px-4 rounded-lg hover:bg-emerald-700 focus:ring-4 focus:ring-emerald-500/20 active:scale-[0.98] transition-all sm:h-[38px]">
                            Start Translation
                        </button>
                    </div>
                    <div id="atlasStatus" class="text-xs mt-2 hidden"></div>
                </div>

                <!-- Progress Section -->
                <div id="progressSection" class="hidden px-4 py-4 sm:px-5 border-b border-slate-100 bg-emerald-50/50">
                    <div class="w-full bg-emerald-200/50 rounded-full h-1.5 overflow-hidden">
                        <div id="progressBar" class="bg-emerald-500 h-1.5 rounded-full transition-all duration-300 relative shadow-[0_0_10px_rgba(16,185,129,0.4)]" style="width: 0%"></div>
                    </div>
                    <div id="progressText" class="text-xs font-medium text-emerald-700 mt-2 text-center tracking-wide">Initializing...</div>
                </div>

                <!-- Display area -->
                <div id="translationDisplay" class="p-4 sm:p-5" style="display:none;">
                    <div id="scriptTabs" class="hidden mb-4">
                        <div class="-mx-4 sm:mx-0 px-4 sm:px-0 flex gap-2 overflow-x-auto pb-2 scrollbar-thin">
                            <!-- Script tabs will be added here dynamically -->
                        </div>
                    </div>
                    <!-- Gaming Mode launch bar — shown after translation completes -->
                    <div id="gamingModeBar" class="hidden mb-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3 bg-indigo-50 border border-indigo-200 rounded-lg px-4 py-3 sm:py-2.5">
                        <span class="text-sm text-indigo-800 font-medium">View in Gaming Mode — immersive VN-style playback</span>
                        <button onclick="openGamingMode()" class="w-full sm:w-auto flex justify-center items-center gap-1.5 bg-indigo-600 text-white text-sm font-medium px-4 py-2 sm:py-1.5 rounded-lg hover:bg-indigo-700 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            Gaming Mode
                        </button>
                    </div>
                    <div id="translationResults" class="space-y-6"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loading" class="loading fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 items-center justify-center">
        <div class="bg-white p-6 rounded-xl shadow-2xl flex flex-col items-center max-w-sm w-full mx-4">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-100 border-t-indigo-600 mb-4"></div>
            <p class="text-slate-800 font-medium text-lg">Processing</p>
            <p class="text-slate-500 text-sm mt-1">Please wait a moment...</p>
        </div>
    </div>

    <script>
        console.log("JS loaded");
        function showLoading() {
            document.getElementById('loading').classList.add('active', 'flex');
        }
        function hideLoading() {
            document.getElementById('loading').classList.remove('active', 'flex');
        }
        hideLoading(); // 页面加载后立即隐藏

        console.log("Loading index.html");
        let currentDialogues = [];
        let selectedWar = null;
        let selectedActivity = null;
        let warResults = [];
        let questResults = [];
        let selectedQuest = null;
        let selectedPhaseScripts = [];   // scripts for the currently selected phase
        let _phaseScriptsMap = {};        // phase → scripts[], populated by selectQuest()
        let currentQuestRegion = 'JP';
        let questResultLabel = 'quests';
        const questCache = new Map();    // key: `${kind}_${id}_${region}` → {quests, wars, activity}

        // 初始化 Socket.IO
        const socket = io();
        let currentTranslationSession = null;

        // 监听翻译进度更新
        socket.on('translation_progress', function(data) {
            if (data.session_id === currentTranslationSession) {
                const progressBar = document.getElementById('progressBar');
                const progressText = document.getElementById('progressText');
                progressBar.style.width = `${data.progress}%`;
                progressText.textContent = `Translating: ${data.current}/${data.total} (${data.progress}%) - ${data.speaker || ''}`;
            }
        });

        // 搜索 war
        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatUnixTime(value) {
            if (!value) return '';
            const date = new Date(Number(value) * 1000);
            if (Number.isNaN(date.getTime())) return '';
            return date.toLocaleString();
        }

        function isMobileViewport() {
            return window.matchMedia('(max-width: 767px)').matches;
        }

        function scrollSectionIntoView(id) {
            if (!isMobileViewport()) return;
            const el = document.getElementById(id);
            if (!el) return;
            window.setTimeout(() => {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 80);
        }

        function setDiscoveryCollapsed(collapsed) {
            const card = document.getElementById('discoveryCard');
            const toggle = document.getElementById('discoveryToggle');
            if (!card || !toggle) return;
            const shouldCollapse = collapsed && isMobileViewport();
            card.classList.toggle('discovery-collapsed', shouldCollapse);
            toggle.setAttribute('aria-expanded', String(!shouldCollapse));
        }

        function updateDiscoverySummary(label) {
            const summary = document.getElementById('discoverySummary');
            if (!summary) return;
            summary.textContent = label || 'Search';
        }

        function toggleDiscoveryPanel() {
            const card = document.getElementById('discoveryCard');
            if (!card) return;
            setDiscoveryCollapsed(!card.classList.contains('discovery-collapsed'));
        }

        function collapseDiscoveryOnMobile() {
            setDiscoveryCollapsed(true);
        }

            document.getElementById('scriptTabs').classList.add('hidden');
            document.getElementById('progressSection').classList.add('hidden');

            document.getElementById('questResultList').innerHTML = '';

                });

        async function searchActivity() {
            console.log("Starting search");
            showLoading();
            const activityName = document.getElementById('warName').value.trim();
            const activityType = document.getElementById('activitySearchType').value || 'war';
            currentQuestRegion = document.getElementById('activityRegion').value || 'JP';
            questResultLabel = 'quests';
            document.getElementById('questSectionTitle').textContent = 'Related Quests';
            document.getElementById('getQuestBtn').style.display = '';
            document.getElementById('latestActivityInfo').innerText = '';
            document.getElementById('latestTaskInfo').innerText = '';
            selectedWar = null;
            selectedActivity = null;
            // 清空展示区和quest选择内容
            document.getElementById('warResultList').innerHTML = '';
            document.getElementById('questResultList').innerHTML = '';
            document.getElementById('questResultInfo').innerText = '';
            document.getElementById('translationResults').innerHTML = '';
            document.getElementById('scriptTabs').classList.add('hidden');
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('translateSection').style.display = 'none';
            document.getElementById('translationOptions').style.display = 'none';
            document.getElementById('translationDisplay').style.display = 'none';
            try {
                // 检查是否为纯数字
                const endpoint = activityType === 'event' ? '/search_event' : '/search_war';
                const body = activityType === 'event'
                    ? { event_name: activityName, region: currentQuestRegion, limit: 50 }
                    : { war_name: activityName, region: currentQuestRegion, limit: 50 };
                const activityResponse = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const activityData = await activityResponse.json();
                if (activityData.error) throw new Error(activityData.error);
                warResults = activityType === 'event' ? (activityData.events || []) : (activityData.wars || []);
                showActivityResults(warResults, activityType === 'event' ? 'events' : 'wars');
                collapseDiscoveryOnMobile();
                scrollSectionIntoView('warResultList');
                return;
                if (/^\d+$/.test(warName)) {
                    const useId = window.confirm('检测到输入为数字，是否以ID检索？\n点击"确定"以ID检索，点击"取消"以名称模糊搜索。');
                    if (useId) {
                        // 以ID检索，直接用id字符串请求
                        const warResponse = await fetch('/search_war', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ war_name: warName })
                        });
                        const warData = await warResponse.json();
                        warResults = warData.wars || [];
                        showWarResults(warResults);
                        return;
                    }
                    // 否则继续走名称模糊搜索
                }
                // Search for war（原有逻辑）
                const warResponse = await fetch('/search_war', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ war_name: warName })
                });
                const warData = await warResponse.json();
                warResults = warData.wars || [];
                showWarResults(warResults);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('warResultInfo').innerText = 'Error occurred.';
                document.getElementById('warResultList').innerHTML = '';
            } finally {
                hideLoading();
            }
        }

            document.getElementById('questSection').style.display = 'none';
            document.getElementById('translateSection').style.display = 'none';
            if (list.length === 0) {
                document.getElementById('warResultInfo').innerHTML = `<span style='color:#c00'>No results found</span>`;
                document.getElementById('warResultList').innerHTML = '';

            }
            document.getElementById('warResultInfo').innerHTML = `Found <b>${list.length}</b> ${escapeHtml(label)}. Please select one.`;
            document.getElementById('warResultList').innerHTML = list.map((activity, idx) => {
                const kind = activity.itemKind || 'war';
                const meta = kind === 'event'
                    ? [
                        activity.region,
                        activity.type,
                        activity.startedAt ? `Start: ${formatUnixTime(activity.startedAt)}` : '',
                        activity.endedAt ? `End: ${formatUnixTime(activity.endedAt)}` : '',
                        activity.warIds && activity.warIds.length ? `${activity.warIds.length} wars` : 'No war map'
                    ].filter(Boolean).map(escapeHtml).join(' | ')
                    : [
                        activity.region,
                        activity.longName,
                        activity.eventName,
                        activity.age,
                        activity.startedAt ? `Start: ${formatUnixTime(activity.startedAt)}` : '',
                        activity.endedAt ? `End: ${formatUnixTime(activity.endedAt)}` : ''
                    ].filter(Boolean).map(escapeHtml).join(' | ');
                const bannerUrl = activity.banner || activity.noticeBanner || activity.headerImage || activity.icon || '';
                const thumbHtml = bannerUrl

                    : '';
                return `<div class="result-item selectable group mb-2" data-id="${escapeHtml(activity.id)}" data-idx="${idx}" onclick="selectActivity(this, ${idx})">
                    <div class="cursor-pointer group-hover:bg-blue-50 rounded-lg px-2 py-2.5 sm:py-2 border border-transparent group-hover:border-blue-200 transition-colors">
                        ${thumbHtml ? `<div class="mb-2">${thumbHtml}</div>` : ''}
                        <div class="font-semibold text-sm sm:text-base text-blue-900 leading-snug break-words">
                            <span class="text-[11px] sm:text-xs font-mono text-slate-400 mr-1.5">[${escapeHtml(kind)}:${escapeHtml(activity.id)}]</span><span>${escapeHtml(activity.name || activity.longName)}</span>
                        </div>
                        ${meta ? `<div class="text-xs text-gray-500 mt-1 leading-relaxed break-words">${meta}</div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function showWarResults(list) {
            selectedWar = null;
            document.getElementById('questSection').style.display = 'none';
            document.getElementById('translateSection').style.display = 'none';
            if (list.length === 0) {
                document.getElementById('warResultInfo').innerHTML = `<span style='color:#c00'>No results found</span>`;

                        <span class="font-mono text-xs text-slate-400">[${escapeHtml(w.id)}]</span> <span class="break-words">${escapeHtml(w.name)}</span>
                    </div>
                </div>`
            ).join('');

        function selectActivity(elem, idx) {
            document.querySelectorAll('.result-item.selectable').forEach(e => e.style.background = '');
            elem.style.background = '#e3f2fd';
            selectedActivity = warResults[idx];
            selectedWar = selectedActivity;
            currentQuestRegion = (selectedActivity && selectedActivity.region) || 'JP';
            questResultLabel = 'quests';
            document.getElementById('questSectionTitle').textContent = 'Related Quests';
            document.getElementById('getQuestBtn').style.display = '';
            document.getElementById('questSection').style.display = '';
            document.getElementById('translateSection').style.display = 'none';
            document.getElementById('questResultInfo').innerText = '';
            document.getElementById('questResultList').innerHTML = '';
            selectedQuest = null;
            selectedPhaseScripts = [];
            // Restore from cache if available
            const cacheKey = `${selectedActivity.itemKind || 'war'}_${selectedActivity.id}_${currentQuestRegion}`;
            if (questCache.has(cacheKey)) {
                const cached = questCache.get(cacheKey);
                questResults = cached.quests;
                renderActivityBanner(cached.activity, cached.wars);
                showQuestResults(cached.quests, 'quests', cached.wars);
                document.getElementById('questResultInfo').innerHTML =
                    `<b>${cached.quests.length}</b> quests loaded (cached) — click <em>Fetch Quests</em> to refresh.`;
            }
            scrollSectionIntoView('questSection');
        }

        function selectWar(elem, warId) {
            document.querySelectorAll('.result-item.selectable').forEach(e => e.style.background = '');
            elem.style.background = '#e3f2fd';
            selectedWar = warResults.find(w => String(w.id) === String(warId));
            selectedActivity = selectedWar;
            currentQuestRegion = selectedWar.region || 'JP';

            document.getElementById('questSectionTitle').textContent = 'Related Quests';
            document.getElementById('getQuestBtn').style.display = '';
            document.getElementById('questSection').style.display = '';
